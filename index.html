    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B651X4S3J7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B651X4S3J7', {
        send_page_view: true,
        cookie_flags: 'SameSite=None;Secure',
        custom_map: {
          'dimension1': 'report_download',
          'dimension2': 'geo_region',
          'dimension3': 'form_type',
        }
      });
      // Track PDF downloads as events
      function trackDownload(reportName, geo) {
        gtag('event', 'download', {
          event_category: 'report',
          event_label: reportName,
          report_download: reportName,
          geo_region: geo || 'unknown',
        });
      }
      // Track form submissions
      function trackFormSubmit(formType) {
        gtag('event', 'submit', {
          event_category: 'form',
          event_label: formType,
          form_type: formType,
        });
      }
    </script>
